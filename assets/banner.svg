<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dcfff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7dcfff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#414868" stroke-width="0.25" opacity="0.35"/>
    </pattern>
    <filter id="titleglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="960" height="200" rx="10" fill="url(#bg)"/>
  <rect width="960" height="200" rx="10" fill="url(#grid)"/>
  <rect width="960" height="70" y="55" fill="url(#glow)"/>
  <!-- Left accent -->
  <rect x="0" y="0" width="5" height="200" rx="2" fill="#7dcfff"/>
  <!-- LATEX watermark -->
  <text x="30" y="155" font-family="Georgia,serif" font-size="130" fill="#7dcfff" font-weight="bold" opacity="0.04" letter-spacing="6">LATEX</text>
  <!-- Title -->
  <text x="280" y="78" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="34" fill="#c0caf5" font-weight="700" filter="url(#titleglow)">awesome-latex-skills</text>
  <!-- Subtitle -->
  <text x="280" y="106" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#a9b1d6">AI agent skills for LaTeX &amp; academic workflows</text>
  <!-- Skill pills -->
  <rect x="280" y="126" width="82" height="26" rx="13" fill="#f7768e" opacity="0.9"/>
  <text x="321" y="144" font-family="-apple-system,sans-serif" font-size="11.5" fill="#1a1b26" text-anchor="middle" font-weight="600">rescue</text>
  <rect x="372" y="126" width="76" height="26" rx="13" fill="#9ece6a" opacity="0.9"/>
  <text x="410" y="144" font-family="-apple-system,sans-serif" font-size="11.5" fill="#1a1b26" text-anchor="middle" font-weight="600">polish</text>
  <rect x="458" y="126" width="52" height="26" rx="13" fill="#7dcfff" opacity="0.9"/>
  <text x="484" y="144" font-family="-apple-system,sans-serif" font-size="11.5" fill="#1a1b26" text-anchor="middle" font-weight="600">fmt</text>
  <rect x="520" y="126" width="62" height="26" rx="13" fill="#bb9af7" opacity="0.9"/>
  <text x="551" y="144" font-family="-apple-system,sans-serif" font-size="11.5" fill="#1a1b26" text-anchor="middle" font-weight="600">read</text>
  <rect x="592" y="126" width="76" height="26" rx="13" fill="#e0af68" opacity="0.9"/>
  <text x="630" y="144" font-family="-apple-system,sans-serif" font-size="11.5" fill="#1a1b26" text-anchor="middle" font-weight="600">pdf2tex</text>
  <!-- Decorative corner -->
  <circle cx="900" cy="36" r="3" fill="#f7768e" opacity="0.35"/>
  <circle cx="914" cy="36" r="3" fill="#9ece6a" opacity="0.35"/>
  <circle cx="928" cy="36" r="3" fill="#7dcfff" opacity="0.35"/>
  <!-- Bottom tagline -->
  <line x1="280" y1="168" x2="668" y2="168" stroke="#414868" stroke-width="0.4" opacity="0.4"/>
  <text x="474" y="186" font-family="-apple-system,sans-serif" font-size="10.5" fill="#565f89" text-anchor="middle">structured workflows · domain references · guardrails</text>
</svg>
