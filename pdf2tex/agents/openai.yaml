name: pdf2tex
description: Convert PDF documents into editable LaTeX source code
type: skill
skill_file: pdf2tex/SKILL.md
platform: openai
model: gpt-4.1
auto_activate:
  - triggers:
    - "convert.*pdf.*(tex|latex)"
    - "pdf.*(to|2).*(tex|latex)"
    - "extract.*latex.*(from|pdf)"
    - "reconstruct.*latex"
    - "get.*tex.*(from|pdf)"
    - "pdf转tex"
    - "pdf转latex"
    - "恢复.*(tex|latex).*源码"
